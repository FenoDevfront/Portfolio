  <!-- Windows grid -->
  <rect x="110" y="90" width="40" height="30" rx="2" fill="rgba(255,255,255,0.25)"/>
  <rect x="160" y="90" width="40" height="30" rx="2" fill="rgba(255,255,255,0.25)"/>
  <rect x="210" y="90" width="40" height="30" rx="2" fill="rgba(255,255,255,0.25)"/>
  <rect x="260" y="90" width="40" height="30" rx="2" fill="rgba(255,255,255,0.25)"/>
  <rect x="110" y="130" width="40" height="30" rx="2" fill="rgba(255,255,255,0.25)"/>
  <rect x="160" y="130" width="40" height="30" rx="2" fill="rgba(255,255,255,0.25)"/>
  <rect x="210" y="130" width="40" height="30" rx="2" fill="rgba(255,255,255,0.25)"/>
  <rect x="260" y="130" width="40" height="30" rx="2" fill="rgba(255,255,255,0.25)"/>
  <!-- MGB text -->
  <text x="200" y="55" text-anchor="middle" fill="white" font-size="16" font-weight="bold" font-family="Arial">MGB</text>
</svg>
