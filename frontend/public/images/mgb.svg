      <stop offset="0%" style="stop-color:#4facfe"/>
      <stop offset="100%" style="stop-color:#00f2fe"/>
    </linearGradient>
  </defs>
  <rect width="400" height="200" fill="url(#grad3)"/>
  <!-- Building envelope design -->
  <rect x="80" y="60" width="240" height="120" rx="5" fill="rgba(255,255,255,0.15)"/>
  <rect x="90" y="70" width="220" height="100" rx="3" fill="rgba(255,255,255,0.1)"/>
  <!-- Roof/envelope -->
